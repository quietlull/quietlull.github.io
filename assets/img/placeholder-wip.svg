<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0f1825" />
      <stop offset="100%" stop-color="#080f1b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fbbf24" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="450" />
    <line x1="400" y1="0" x2="400" y2="450" />
    <line x1="600" y1="0" x2="600" y2="450" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="300" x2="800" y2="300" />
  </g>

  <!-- Center icon: simple wrench + gear -->
  <g transform="translate(400, 190)" filter="url(#glow)">
    <!-- Gear circle -->
    <circle cx="0" cy="0" r="24" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5" />
    <!-- Gear teeth -->
    <g opacity="0.4" fill="url(#accent)">
      <rect x="-3" y="-30" width="6" height="8" rx="1" />
      <rect x="-3" y="22" width="6" height="8" rx="1" />
      <rect x="-30" y="-3" width="8" height="6" rx="1" />
      <rect x="22" y="-3" width="8" height="6" rx="1" />
      <rect x="16" y="-22" width="6" height="8" rx="1" transform="rotate(45, 19, -18)" />
      <rect x="-22" y="14" width="6" height="8" rx="1" transform="rotate(45, -19, 18)" />
      <rect x="-22" y="-22" width="6" height="8" rx="1" transform="rotate(-45, -19, -18)" />
      <rect x="16" y="14" width="6" height="8" rx="1" transform="rotate(-45, 19, 18)" />
    </g>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#fbbf24" opacity="0.6" />
  </g>

  <!-- WIP text -->
  <text x="400" y="268" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#fbbf24" opacity="0.5" letter-spacing="0.35em">WORK IN PROGRESS</text>

  <!-- Thin separator -->
  <line x1="340" y1="285" x2="460" y2="285" stroke="#fbbf24" stroke-width="0.5" opacity="0.15" />
</svg>
