<!-- Tag filter pills with icons -->
<div class="filter-pills d-flex flex-wrap gap-2 justify-content-center" id="filter-pills">
  <button class="btn btn-sm filter-pill" data-tag="unity">
    <img src="/assets/img/icons/unity.svg" alt="" class="pill-icon"> Unity
  </button>
  <button class="btn btn-sm filter-pill" data-tag="unreal">
    <img src="/assets/img/icons/unreal.svg" alt="" class="pill-icon"> Unreal
  </button>
  <button class="btn btn-sm filter-pill" data-tag="godot">
    <img src="/assets/img/icons/godot.svg" alt="" class="pill-icon"> Godot
  </button>
  <button class="btn btn-sm filter-pill" data-tag="shader">
    <i class="fas fa-brush" style="background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #9b59b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i> Shader
  </button>
  <button class="btn btn-sm filter-pill" data-tag="tool">
    <i class="fas fa-wrench" style="color: #b0b8c4;"></i> Tool
  </button>
  <button class="btn btn-sm filter-pill" data-tag="vfx">
    <i class="fas fa-wand-magic-sparkles" style="color: #4d96ff;"></i> VFX
  </button>
  <button class="btn btn-sm filter-pill" data-tag="rigging">
    <i class="fas fa-bone" style="color: #9b59b6;"></i> Rigging
  </button>
  <button class="btn btn-sm filter-pill" data-tag="2d">
    <i class="fas fa-image" style="color: #6bcb77;"></i> 2D
  </button>
  <button class="btn btn-sm filter-pill" data-tag="3d">
    <i class="fas fa-cube" style="color: #f0a500;"></i> 3D
  </button>
  <button class="btn btn-sm filter-pill" data-tag="study">
    <i class="fas fa-book" style="color: #e8a87c;"></i> Study
  </button>
</div>
